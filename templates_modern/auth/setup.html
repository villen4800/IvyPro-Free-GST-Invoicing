<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvyPro - First Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    min-height: 100vh; 
    display: grid; 
    place-items: center; 
    background: radial-gradient(circle at top left, #0a0a0a, #020202); 
    color: #f0f0f0; 
    font-family: 'Inter', sans-serif; 
    padding: 20px; 
}
.setup { 
    width: 520px; 
    max-width: 100%; 
    background: rgba(10, 10, 10, 0.8); 
    backdrop-filter: blur(20px);
    border: 1px solid #1a1a1a; 
    border-radius: 20px; 
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    overflow: hidden; 
}
.head { 
    padding: 32px; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    background: rgba(255, 255, 255, 0.02);
}
.brand { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    margin-bottom: 0; 
}
.icon { 
    width: 48px; 
    height: 48px; 
    border-radius: 12px; 
    background: linear-gradient(135deg, rgb(255, 116, 41), #ff914d); 
    color: #fff; 
    display: grid; 
    place-items: center; 
    font-family: 'Rajdhani', sans-serif; 
    font-weight: 800; 
    font-size: 24px; 
    box-shadow: 0 4px 12px rgba(255, 116, 41, 0.3);
}
h1 { 
    font-family: 'Rajdhani', sans-serif; 
    font-size: 32px; 
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
p { 
    color: #94a3b8; 
    font-size: 14px; 
    line-height: 1.5; 
    margin-top: 4px; 
}
form { 
    padding: 32px; 
}
.form-group { 
    margin-bottom: 20px; 
}
label { 
    display: block; 
    color: #94a3b8; 
    font-size: 12px; 
    font-weight: 600; 
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px; 
}
input { 
    width: 100%; 
    min-height: 44px; 
    background: #050505;
    border: 1.5px solid #1a1a1a; 
    border-radius: 10px; 
    padding: 10px 16px; 
    font: inherit; 
    color: #f8fafc;
    outline: none; 
    transition: all 0.2s ease;
}
input:focus { 
    background: #000;
    border-color: rgb(255, 116, 41); 
    box-shadow: 0 0 0 4px rgba(255, 116, 41, 0.15); 
}
input::placeholder {
    color: #475569;
}
input[type="file"] {
    padding: 8px;
    font-size: 13px;
    color: #94a3b8;
}
.btn { 
    width: 100%; 
    min-height: 48px; 
    border: 0; 
    border-radius: 10px; 
    background: linear-gradient(to right, rgb(255, 116, 41), #ff914d); 
    color: #fff; 
    font-weight: 700; 
    font-size: 15px;
    cursor: pointer; 
    transition: all 0.2s ease;
    margin-top: 8px;
    box-shadow: 0 4px 12px rgba(255, 116, 41, 0.2);
}
.btn:hover {
    transform: translateY(-1px);
    background: linear-gradient(to right, #ff914d, #e6601a);
}
.btn:active {
    transform: translateY(0);
}
.alert { 
    background: rgba(239, 68, 68, 0.1); 
    border: 1px solid rgba(239, 68, 68, 0.2); 
    color: #fca5a5; 
    border-radius: 10px; 
    padding: 12px 16px; 
    font-size: 14px; 
    margin-bottom: 20px; 
    display: flex;
    align-items: center;
    gap: 8px;
}
</style>
</head>
<body>
<div class="setup">
  <div class="head">
    <div class="brand">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 24px; height: 24px;">
          <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>IvyPro</h1>
        <p>Create the first administrator account to start using the software.</p>
      </div>
    </div>
  </div>
  <form method="POST" enctype="multipart/form-data">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}<div class="alert">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <div class="form-group">
      <label>Full Name</label>
      <input name="full_name" placeholder="Owner / Administrator">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" required minlength="6">
    </div>
    <div class="form-group">
      <label>User Photo</label>
      <input type="file" name="photo" accept="image/*">
    </div>
    <button class="btn" type="submit">Create Admin Account</button>
  </form>
</div>
</body>
</html>
