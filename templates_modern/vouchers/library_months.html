{% extends "base.html" %}

{% block content %}
<div class="m-container">
    <div class="m-header">
        <div>
            <h1 class="m-title">{{ client }}</h1>
            <p class="m-subtitle">Select month to view archived invoices</p>
        </div>
        <a href="{{ url_for('vouchers.library') }}" class="m-btn m-btn-secondary">Back to Clients</a>
    </div>

    <div class="m-grid m-grid-4 gap-4">
        {% for m in months %}
        <a href="{{ url_for('vouchers.library', client=client, month=m) }}" class="m-card m-p-3 m-text-center m-text-decoration-none">
            <div class="m-icon-large m-bg-green-light m-mx-auto m-mb-2">
                <i class="ri-calendar-line"></i>
            </div>
            <div class="m-font-bold">{{ m }}</div>
        </a>
        {% endfor %}
    </div>
</div>

<style>
.m-mx-auto { margin-left: auto; margin-right: auto; }
.m-text-decoration-none { text-decoration: none; color: inherit; }
.m-text-decoration-none:hover { transform: translateY(-4px); border-color: var(--m-accent); }
</style>
{% endblock %}
